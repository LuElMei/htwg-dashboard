<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>timetable</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <img src="assets/images/htwg-logo-no-bg.png" alt="HTWG Logo" class="header-logo">
        <p class="header-text">Dashboard</p>
    </header>
    <aside class="sidebar">
            <h2 class="sidebar-title">Menü</h2>
            <ul>
                <li class="sidebar-item">
                    <i data-lucide="layout-dashboard"></i>
                    <a href="dashboard.html">Dashboard</a>
                </li>
                <li class="sidebar-item">
                    <i data-lucide="calendar-days active"></i>
                    <a href="timetable.hmtl" class="sidebar-item-text">Stundenplan</a>
                </li>
                <li class="sidebar-item">
                    <i data-lucide="utensils"></i>
                    <a href="mensa.html" class="sidebar-item-text">Mensa</a>
                </li>
                <li class="sidebar-item">
                    <i data-lucide="book-open"></i>
                    <a href="bibliothek.html" class="sidebar-item-text">Bibliothek</a>
                </li>
            </ul>
        </aside>
    <script>
        function toggleMenu() {
            document.querySelector('.nav-menu').classList.toggle('active');
        }
    </script>   
    <main class="content">
        <h1>Stundenplan</h1>
        <h3>KW 20, 4. April 2026</h3>
        <div class="timetable-grid">
            <div class="timetable-item current">
                <section class="item-time">11:15</section>
                <section class="divider"></section>
                <section class="item-subject">
                    <h3 class="subject-name">Programmiertechnik 2</h3>
                    <span class="subject-room">O-301</span>
                </section>
            </div>
            <div class="timetable-item later">
                <section class="item-time">14:00</section>
                <section class="divider"></section>
                <section class="item-subject">
                    <h3 class="subject-name">Algebra</h3>
                    <span class="subject-room">F-031</span>
                </section>
            </div>
        </div>
</body>
</html>
