<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htwg-dashboard/index</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <a href="index.html" class="logo-link">
                <img src="assets/images/htwg-logo-no-bg.png" alt="HTWG Logo" class="logo-image">
                <span class="page-title">Dashboard</span>
            </a>
        </div>
    </header>

    <main class="setup-main">
        <form action="dashboard.html" method="GET">
            <div class="form-elem">
                <label for="user-name">Wie ist dein Name?</label>
                <input type="text" id="user-name" name="username" placeholder="z.B Max Mustermann" required>
            </div>

            <div class="form-elem">
                <label for="user-course">Was studierst du in welchem Semester?</label>
                <input type="text" id="user-course" name="course" placeholder="z.B AIN3" required>
            </div>
        </form>

        <button>Bestätigen</button>

    </main>
</body>
<footer></footer>
</html>
