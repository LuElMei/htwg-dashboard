<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htwg-dashboard/index</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-main">
    <header class="main-header">
        <div class="logo">
            <a href="dashboard.html" class="logo-link">
                <img src="assets/images/htwg-logo-no-bg.png" alt="HTWG Logo" class="logo-image">
                <span class="page-title">Dashboard</span>
            </a>
        </div>
    </header>

    <main class="setup-main">
        <form action="dashboard.html" method="GET">
            <div class="form-elem">
                <label for="user-name">Username</label>
                <input type="text" id="user-name" name="username" placeholder="z.B Max Mustermann" required>
            </div>

            <div class="form-elem">
                <label for="user-course">Passwort</label>
                <input type="text" id="user-course" name="course" placeholder="z.B 123" required>
            </div>
        </form>
        
        <button class="button-index">Bestätigen</button>

        <footer>
            <button> register </button>
            <button> passwort vergessen </button>
            
        </footer>
    </main>
</body>
</html>
